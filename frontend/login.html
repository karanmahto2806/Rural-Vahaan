<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rural Vahaan</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚜</text></svg>">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🚜 Rural Vahaan <span>Login</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-card" style="max-width: 500px; margin: 0 auto;">
            <h2 style="text-align: center;">🔐 Welcome Back</h2>
            <p style="text-align: center; color: var(--gray); margin-bottom: 2rem;">Login to your account</p>
            
            <div id="alert" class="alert" style="display: none;"></div>
            
            <label>📧 Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
            
            <label>🔒 Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
            
            <button id="loginBtn">Login →</button>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Don't have an account? <a href="register.html" style="color: var(--primary);">Register here</a>
            </p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alert');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                showAlert('Please enter both email and password', 'error');
                return;
            }
            
            loginBtn.innerText = 'Logging in...';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        if (data.user.role === 'driver') window.location.href = 'driver.html';
                        else window.location.href = 'passenger.html';
                    }, 1000);
                } else {
                    showAlert(data.message || 'Login failed', 'error');
                    loginBtn.innerText = 'Login →';
                    loginBtn.disabled = false;
                }
            } catch (error) {
                showAlert('Server error. Make sure backend is running.', 'error');
                loginBtn.innerText = 'Login →';
                loginBtn.disabled = false;
            }
        }
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 3000);
        }
        
        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        
        // Check if already logged in
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (token && user.id) {
            if (user.role === 'driver') window.location.href = 'driver.html';
            else if (user.role === 'passenger') window.location.href = 'passenger.html';
        }
    </script>
</body>
</html>
