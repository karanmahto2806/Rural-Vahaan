<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - Rural Vahaan</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Additional styles for permission UI */
        .permission-prompt {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            text-align: center;
        }
        .permission-prompt button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .location-status {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .error-banner {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🚜 Rural Vahaan <span>Driver</span></div>
        <div class="nav-links">
            <span id="userName" style="color: var(--dark); font-weight: 500;"></span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Error Banner -->
        <div id="errorBanner" class="error-banner"></div>

        <div class="form-card">
            <h2>📋 Register Your Vehicle</h2>
            <div id="registerAlert" class="alert" style="display: none;"></div>
            <select id="vehicleType">
                <option value="">-- Select Vehicle Type --</option>
                <option value="tractor">🚜 Tractor</option>
                <option value="bike">🏍️ Bike</option>
                <option value="car">🚗 Car</option>
                <option value="mini_truck">🚛 Mini Truck</option>
                <option value="tempo">🚐 Tempo</option>
                <option value="jcb">🏗️ JCB</option>
                <option value="auto_rickshaw">🛺 Auto Rickshaw</option>
                <option value="e_rickshaw">🔋 E-Rickshaw</option>
                <option value="jeep">🚙 Jeep</option>
            </select>
            <input type="text" id="vehicleName" placeholder="Vehicle Name (e.g., Mahindra 575)">
            <input type="text" id="vehicleNumber" placeholder="Vehicle Number (e.g., HR12AB1234)">
            <input type="number" id="hourlyRate" placeholder="Hourly Rate (₹ per hour)">
            <input type="number" id="perKmRate" placeholder="Per KM Rate (₹ per km)">
            <button onclick="registerVehicle()">✅ Register Vehicle</button>
        </div>
        
        <div class="my-vehicles"><h2>🚗 My Vehicles</h2><div id="myVehiclesList"><div class="loading">Loading...</div></div></div>
        
        <div class="status-card">
            <h2>🟢 Set Availability</h2>
            <div class="toggle-switch" style="display: flex; justify-content: center; gap: 1rem;">
                <span>Offline</span>
                <label class="switch"><input type="checkbox" id="availabilityToggle" onchange="toggleAvailability()"><span class="slider round"></span></label>
                <span>Online</span>
            </div>
            <p id="statusText" style="text-align: center; margin-top: 1rem;">Select a vehicle to go online</p>
            <div id="locationStatus" class="location-status" style="text-align: center;"></div>
        </div>
        
        <div class="map-card"><h2>📍 Your Live Location</h2><div id="map" class="map"></div><p>Your location updates every 10 seconds</p></div>
        <div class="requests-card"><h2>📢 Ride Requests</h2><div id="rideRequests"><div class="loading">No pending requests</div></div></div>
        <div class="active-rides"><h2>🔄 Active Rides</h2><div id="activeRides"><div class="loading">No active rides</div></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL = 'http://localhost:5000/api';
        let map = null, driverMarker = null, currentLocation = null, watchId = null, refreshInterval = null;
        let myVehicles = [], selectedVehicleId = null;
        let locationPermissionGranted = false;
        
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token || !user.id) window.location.href = 'login.html';
        if (user.role !== 'driver') { alert('Please register as driver'); window.location.href = 'register.html?role=driver'; }
        document.getElementById('userName').innerHTML = `👤 ${user.name}`;
        
        function logout() { 
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (refreshInterval) clearInterval(refreshInterval);
            localStorage.clear(); 
            window.location.href = 'login.html'; 
        }
        
        function showError(message) {
            const banner = document.getElementById('errorBanner');
            banner.textContent = message;
            banner.style.display = 'block';
            setTimeout(() => banner.style.display = 'none', 5000);
        }
        
        async function registerVehicle() {
            const vehicleType = document.getElementById('vehicleType').value;
            const vehicleName = document.getElementById('vehicleName').value;
            const vehicleNumber = document.getElementById('vehicleNumber').value;
            const hourlyRate = document.getElementById('hourlyRate').value;
            const perKmRate = document.getElementById('perKmRate').value;
            
            if (!vehicleType || !vehicleName || !vehicleNumber) { showAlert('Fill all fields', 'error'); return; }
            
            const response = await fetch(`${API_URL}/vehicles/register`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ vehicle_type: vehicleType, vehicle_name: vehicleName, vehicle_number: vehicleNumber, hourly_rate: hourlyRate, per_km_rate: perKmRate })
            });
            const data = await response.json();
            if (data.success) { showAlert('Vehicle registered!', 'success'); loadMyVehicles(); }
            else { showAlert(data.message, 'error'); }
        }
        
        function showAlert(msg, type) {
            const div = document.getElementById('registerAlert');
            div.textContent = msg; div.className = `alert alert-${type}`; div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
        
        async function loadMyVehicles() {
            const response = await fetch(`${API_URL}/vehicles/my-vehicles`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await response.json();
            if (data.success) { myVehicles = data.vehicles; displayMyVehicles(); }
        }
        
        function displayMyVehicles() {
            if (myVehicles.length === 0) { document.getElementById('myVehiclesList').innerHTML = '<div class="alert alert-warning">No vehicles registered</div>'; return; }
            let html = '';
            for (let v of myVehicles) {
                html += `<div class="vehicle-card"><div class="vehicle-header"><div class="vehicle-icon">${v.vehicle_type === 'tractor' ? '🚜' : v.vehicle_type === 'bike' ? '🏍️' : '🚗'}</div><div><h3>${v.vehicle_name}</h3><p>${v.vehicle_number}</p></div></div><button onclick="selectVehicle(${v.id})" style="background: var(--secondary);">${selectedVehicleId === v.id ? '✓ Selected' : 'Select'}</button></div>`;
            }
            document.getElementById('myVehiclesList').innerHTML = html;
        }
        
        function selectVehicle(id) { 
            selectedVehicleId = id; 
            displayMyVehicles(); 
            document.getElementById('statusText').innerHTML = 'Vehicle selected! Turn ON online';
            document.getElementById('locationStatus').innerHTML = '';
        }
        
        // NEW: Request location permission explicitly
        async function requestLocationPermission() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject('Geolocation not supported');
                    return;
                }
                
                // Check if permission already granted
                if (navigator.permissions) {
                    navigator.permissions.query({ name: 'geolocation' }).then(permission => {
                        if (permission.state === 'granted') {
                            resolve(true);
                        } else if (permission.state === 'denied') {
                            reject('Location permission denied. Please check browser settings.');
                        } else {
                            // Request permission by getting current position
                            navigator.geolocation.getCurrentPosition(
                                (position) => {
                                    locationPermissionGranted = true;
                                    resolve(true);
                                },
                                (error) => {
                                    if (error.code === 1) {
                                        reject('Location permission denied. Click the lock icon in address bar to allow.');
                                    } else {
                                        reject('Error getting location: ' + error.message);
                                    }
                                },
                                { enableHighAccuracy: true, timeout: 10000 }
                            );
                        }
                    });
                } else {
                    // Fallback for browsers without permissions API
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            locationPermissionGranted = true;
                            resolve(true);
                        },
                        (error) => reject('Please enable location access'),
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                }
            });
        }
        
        // FIXED: Start location tracking with proper permission handling
        async function startLocationTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            // Update status
            document.getElementById('locationStatus').innerHTML = '📍 Requesting location permission...';
            
            try {
                // First, request permission explicitly
                await requestLocationPermission();
                
                // Permission granted, now get initial position
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000
                    });
                });
                
                currentLocation = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                
                // Initialize map and send initial location
                initMap();
                await updateLocation();
                
                document.getElementById('locationStatus').innerHTML = '✅ Location tracking active • Updates every 10 seconds';
                document.getElementById('locationStatus').style.color = 'green';
                
                // Start watching position
                watchId = navigator.geolocation.watchPosition(
                    async (pos) => {
                        currentLocation = {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude
                        };
                        
                        // Update map marker
                        if (driverMarker) {
                            driverMarker.setLatLng([currentLocation.lat, currentLocation.lng]);
                        }
                        
                        // Send to server
                        await updateLocation();
                    },
                    (error) => {
                        console.error('Watch position error:', error);
                        document.getElementById('locationStatus').innerHTML = '⚠️ Location error: ' + error.message;
                        document.getElementById('locationStatus').style.color = 'orange';
                        
                        // Try to restart tracking on error
                        if (error.code !== 1) { // Not permission denied
                            setTimeout(() => {
                                if (document.getElementById('availabilityToggle').checked) {
                                    startLocationTracking();
                                }
                            }, 5000);
                        }
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
                
                return true;
                
            } catch (error) {
                console.error('Location permission error:', error);
                document.getElementById('locationStatus').innerHTML = '❌ ' + error;
                document.getElementById('locationStatus').style.color = 'red';
                showError(error);
                
                // Turn off online toggle
                document.getElementById('availabilityToggle').checked = false;
                document.getElementById('statusText').innerHTML = '🔴 OFFLINE - Location access required';
                
                return false;
            }
        }
        
        function initMap() {
            if (map) {
                map.setView([currentLocation.lat, currentLocation.lng], 14);
                return;
            }
            map = L.map('map').setView([currentLocation.lat, currentLocation.lng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            driverMarker = L.marker([currentLocation.lat, currentLocation.lng], { 
                icon: L.divIcon({ html: '🚗', iconSize: [35, 35], className: 'driver-marker' }) 
            }).addTo(map).bindPopup('Your Location');
        }
        
        async function updateLocation() {
            if (!currentLocation) return;
            try {
                await fetch(`${API_URL}/driver/location`, { 
                    method: 'PUT', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                    body: JSON.stringify({ lat: currentLocation.lat, lng: currentLocation.lng }) 
                });
            } catch (error) {
                console.error('Failed to update location:', error);
            }
        }
        
        function stopLocationTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            document.getElementById('locationStatus').innerHTML = '';
        }
        
        function startDataRefresh() { 
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => { 
                loadRideRequests(); 
                loadActiveRides(); 
            }, 10000); 
        }
        
        // FIXED: Toggle availability with proper location check
        async function toggleAvailability() {
            const isOnline = document.getElementById('availabilityToggle').checked;
            
            if (isOnline && !selectedVehicleId) { 
                alert('Please select a vehicle first'); 
                document.getElementById('availabilityToggle').checked = false; 
                return; 
            }
            
            if (isOnline) {
                // Check location permission and start tracking
                document.getElementById('statusText').innerHTML = '🟡 Checking location access...';
                const locationStarted = await startLocationTracking();
                
                if (!locationStarted || !currentLocation) {
                    alert('Cannot go online: Location access is required. Please enable location in browser settings.');
                    document.getElementById('availabilityToggle').checked = false;
                    document.getElementById('statusText').innerHTML = '🔴 OFFLINE - Location access required';
                    return;
                }
            }
            
            // Update availability on server
            const response = await fetch(`${API_URL}/vehicles/availability/${selectedVehicleId}`, {
                method: 'PUT', 
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ is_available: isOnline ? 1 : 0 })
            });
            const data = await response.json();
            
            if (data.success) {
                if (isOnline) {
                    document.getElementById('statusText').innerHTML = '🟢 ONLINE - Passengers can see you';
                    startDataRefresh();
                    loadRideRequests();
                    loadActiveRides();
                } else {
                    document.getElementById('statusText').innerHTML = '🔴 OFFLINE';
                    stopLocationTracking();
                    if (refreshInterval) clearInterval(refreshInterval);
                }
            } else {
                alert('Failed to update status: ' + data.message);
                document.getElementById('availabilityToggle').checked = false;
                if (isOnline) stopLocationTracking();
            }
        }
        
        async function loadRideRequests() {
            try {
                const response = await fetch(`${API_URL}/rides/requests`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (data.success && data.requests && data.requests.length) {
                    document.getElementById('rideRequests').innerHTML = data.requests.map(r => `<div class="vehicle-card"><div><strong>${r.passenger_name}</strong><br>Fare: ₹${r.fare}<br><button onclick="acceptRide(${r.id})">Accept →</button></div></div>`).join('');
                } else {
                    document.getElementById('rideRequests').innerHTML = '<div class="loading">No pending requests</div>';
                }
            } catch (error) {
                console.error('Failed to load ride requests:', error);
            }
        }
        
        async function acceptRide(id) { 
            await fetch(`${API_URL}/rides/accept/${id}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } }); 
            loadRideRequests(); 
            loadActiveRides(); 
            alert('Ride accepted!'); 
        }
        
        async function startRide(id) { 
            await fetch(`${API_URL}/rides/start/${id}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } }); 
            loadActiveRides(); 
        }
        
        async function completeRide(id) { 
            await fetch(`${API_URL}/rides/complete/${id}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } }); 
            loadActiveRides(); 
            alert('Ride completed!'); 
        }
        
        async function loadActiveRides() {
            try {
                const response = await fetch(`${API_URL}/rides/my-rides`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (data.success && data.rides) {
                    const active = data.rides.filter(r => r.status !== 'completed');
                    document.getElementById('activeRides').innerHTML = active.length ? active.map(r => `<div class="vehicle-card"><div><strong>${r.ride_code}</strong><br>Passenger: ${r.driver_name || r.passenger_name}<br>Status: ${r.status}<br>${r.status === 'accepted' ? `<button onclick="startRide(${r.id})">Start →</button>` : r.status === 'started' ? `<button onclick="completeRide(${r.id})">Complete →</button>` : ''}</div></div>`).join('') : '<div class="loading">No active rides</div>';
                }
            } catch (error) {
                console.error('Failed to load active rides:', error);
            }
        }
        
        // Initial load
        loadMyVehicles();
        
        // Check location permission on page load (just to know status, not start tracking)
        if (navigator.permissions) {
            navigator.permissions.query({ name: 'geolocation' }).then(permission => {
                console.log('Location permission state:', permission.state);
                if (permission.state === 'granted') {
                    locationPermissionGranted = true;
                } else if (permission.state === 'denied') {
                    document.getElementById('locationStatus').innerHTML = '⚠️ Location permission blocked. Click the lock icon in address bar to enable.';
                    document.getElementById('locationStatus').style.color = 'red';
                }
            });
        }
    </script>
</body>
</html>
